<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LCAnimation - Local AI Agent</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }
        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
            text-align: center;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-muted);
            font-size: 14px;
        }
        input[type="file"], input[type="text"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background-color: var(--bg-color);
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background-color: var(--primary);
            color: white;
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
        }
        .btn-primary:disabled {
            background-color: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }
        .export-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
            border-top: 1px solid var(--border);
            padding-top: 24px;
        }
        .btn-export {
            background-color: var(--bg-color);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 12px;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-export:hover:not(:disabled) {
            background-color: var(--border);
        }
        .btn-export:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .progress-container {
            display: none;
            margin-top: 20px;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background-color: var(--border);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 8px;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: var(--success);
            transition: width 0.3s ease, background-color 0.3s ease;
        }
        .progress-text {
            font-size: 14px;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>LCAnimation Studio</h1>
        
        <div class="form-group">
            <label for="image-upload">Upload Base Image (Max 512x512 recommended for VRAM)</label>
            <input type="file" id="image-upload" accept="image/png, image/jpeg, image/webp">
        </div>
        
        <div class="form-group">
            <label for="prompt-input">Animation Prompt</label>
            <input type="text" id="prompt-input" placeholder="e.g., Make the water flow and leaves blow in the wind">
        </div>

        <button id="generate-btn" class="btn-primary" disabled>Generate Animation</button>

        <div class="progress-container" id="progress-container">
            <div class="progress-text">
                <span id="progress-status">Initializing AI Model...</span>
                <span id="progress-percentage">0%</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar-fill"></div>
            </div>
        </div>

        <div class="export-group">
            <button id="btn-export-web" class="btn-export" disabled>🌐 Web (GSAP)</button>
            <button id="btn-export-game" class="btn-export" disabled>🎮 Game (Sprite)</button>
            <button id="btn-export-video" class="btn-export" disabled>🎬 Video (MP4)</button>
        </div>
    </div>
    
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
